<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--
      CSP baseline. Adjust connect-src to include your API origin(s).
      `'unsafe-inline'` on script-src is required by the pre-boot theme script
      below; remove it and migrate to a nonce when you tighten for prod.
    -->
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' https: data:; connect-src 'self'; font-src 'self' data:;" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <!-- X-Frame-Options must be set as an HTTP header by your server, not via meta tag -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!--
      Pre-boot theme + brand script — runs before the Vue bundle parses to
      avoid FOUC. Reads the raw-string formats written by useTheme/useAppUi.
      Keep this inline, tiny, and self-contained. NO imports.
    -->
    <script>
      (function () {
        try {
          // Theme: 'light' | 'dark' | null(=system). Tolerate legacy JSON.
          // Must match src/lib/ThemePersistence.ts THEME_STORAGE_KEY ('app-theme').
          var raw = localStorage.getItem('app-theme');
          var theme = null;
          if (raw === 'light' || raw === 'dark') theme = raw;
          else if (raw && raw.charAt(0) === '"') {
            var u = raw.slice(1, -1);
            if (u === 'light' || u === 'dark') theme = u;
          }
          if (theme) {
            document.documentElement.setAttribute('data-theme', theme);
          } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.setAttribute('data-theme', 'dark');
          }

          // Brand attrs written by useAppUi: 'app-brand' (preset), 'app-radius',
          // 'app-density', 'app-shape'. All raw strings, no JSON.
          var pairs = [
            ['app-brand', 'data-brand'],
            ['app-radius', 'data-radius'],
            ['app-density', 'data-density'],
            ['app-shape', 'data-shape'],
          ];
          for (var i = 0; i < pairs.length; i++) {
            var v = localStorage.getItem(pairs[i][0]);
            if (v) document.documentElement.setAttribute(pairs[i][1], v);
          }
        } catch (_) { /* storage unavailable — silently fall back to default */ }
      })();
    </script>

    <title>Vite + Vue + TS</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
