<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('app-theme');
          var theme = null;
          if (raw === 'light' || raw === 'dark') theme = raw;
          else if (raw && raw.charAt(0) === '"') {
            var u = raw.slice(1, -1);
            if (u === 'light' || u === 'dark') theme = u;
          }
          if (theme) {
            document.documentElement.setAttribute('data-theme', theme);
          } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.setAttribute('data-theme', 'dark');
          }
          var pairs = [
            ['app-brand', 'data-brand'],
            ['app-radius', 'data-radius'],
            ['app-density', 'data-density'],
            ['app-shape', 'data-shape'],
          ];
          for (var i = 0; i < pairs.length; i++) {
            var v = localStorage.getItem(pairs[i][0]);
            if (v) document.documentElement.setAttribute(pairs[i][1], v);
          }
        } catch (_) { }
      })();
    </script>

    <title>Vite + Vue + TS</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
